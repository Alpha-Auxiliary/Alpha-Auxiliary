name: Update GitHub Readme Stats Cards

on:
  schedule:
    # 每天 20:00 UTC 自动刷新；北京时间为次日 04:00。
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark&hide_border=true&include_all_commits=true&count_private=true&locale=cn
          path: profile/stats.svg
          token: ${{ secrets.STATS_GITHUB_TOKEN || github.token }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=dark&hide_border=true&langs_count=8&count_private=true&locale=cn
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_GITHUB_TOKEN || github.token }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "Update GitHub Readme Stats cards"
          git push
